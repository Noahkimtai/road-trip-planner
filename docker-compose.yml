services:
  frontend:
    env_file:
      - .env
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trip-planner-frontend
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - trip_network
    profiles: ["frontend"]

  backend:
    env_file:
      - .env
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trip-planner-backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:${DATABASE_PORT}/trip-planner
      REDIS_URL: ${REDIS_URL}
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - trip_network
    profiles: ["backend"]

  # ── Celery worker ──────────────────────────────────────────────────────────
  celery-worker:
    env_file:
      - .env
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trip-planner-celery-worker
    command: ["celery", "-A", "config", "worker", "--loglevel=info"]
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:${DATABASE_PORT}/trip-planner
      REDIS_URL: ${REDIS_URL}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - trip_network
    profiles: ["backend"]

  # ── Celery beat scheduler ──────────────────────────────────────────────────
  celery-beat:
    env_file:
      - .env
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trip-planner-celery-beat
    command: ["celery", "-A", "config", "beat", "--loglevel=info", "--scheduler", "django_celery_beat.schedulers:DatabaseScheduler"]
    volumes:
      - ./backend:/app
    environment:
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:${DATABASE_PORT}/trip-planner
      REDIS_URL: ${REDIS_URL}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - trip_network
    profiles: ["backend"]

  # ── Backend test runner ─────────────────────────────────────────────────────
  # Runs the pytest suite against a live PostgreSQL instance.
  # Usage:  docker compose --profile tests run --rm backend-tests
  backend-tests:
    env_file:
      - .env
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: trip-planner-backend-tests
    volumes:
      - ./backend:/app
    depends_on:
      db:
        condition: service_healthy
    environment:
      # Django uses DATABASE_URL; DJANGO_SETTINGS_MODULE is also in pytest.ini
      DATABASE_URL: postgresql://postgres:${POSTGRES_PASSWORD}@db:${DATABASE_PORT}/${POSTGRES_DB}
      DJANGO_SETTINGS_MODULE: config.settings
    command: ["python", "-m", "pytest", "tests/", "-v", "--tb=short"]
    networks:
      - trip_network
    profiles: ["tests"]

  # ── Frontend test runner ────────────────────────────────────────────────────
  # Runs the Vitest suite (no network or DB required — all I/O is mocked).
  # Usage:  docker compose --profile tests run --rm frontend-tests
  frontend-tests:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: trip-planner-frontend-tests
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: ["npm", "test"]
    profiles: ["tests"]

  db:
    env_file:
      - .env
    image: postgres:15
    container_name: trip-planner-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5430:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d trip-planner"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - trip_network

  redis:
    image: redis:7
    container_name: trip-planner-redis
    volumes:
      - redis_data:/data
    networks:
      - trip_network

volumes:
  postgres_data:
  redis_data:

networks:
  trip_network:
    driver: bridge
